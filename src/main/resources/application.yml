server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: badran-store-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html

jwt:
  expiration: ${JWT_EXPIRATION_MS:86400000}
