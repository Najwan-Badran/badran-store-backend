spring:
  datasource:
    url: ${TEST_DB_URL:${DB_URL:jdbc:postgresql://localhost:5432/badran_store}}
    username: ${TEST_DB_USERNAME:${DB_USERNAME:najwanbadran}}
    password: ${TEST_DB_PASSWORD:${DB_PASSWORD:}}
