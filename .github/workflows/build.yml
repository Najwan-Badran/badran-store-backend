name: Build

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build-test-package:
    name: Build, Test, Package
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: badran_store
          POSTGRES_USER: badran
          POSTGRES_PASSWORD: badran_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U badran -d badran_store"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      SPRING_PROFILES_ACTIVE: test
      TEST_DB_URL: jdbc:postgresql://localhost:5432/badran_store
      TEST_DB_USERNAME: badran
      TEST_DB_PASSWORD: badran_password
      JWT_SECRET: ci-secret-key-for-badran-store-builds-32-chars-minimum

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Initialize database schema
        run: psql -h localhost -p 5432 -U "$TEST_DB_USERNAME" -d badran_store -f sql/init.sql
        env:
          PGPASSWORD: ${{ env.TEST_DB_PASSWORD }}

      - name: Build, test, and package
        run: mvn clean install
